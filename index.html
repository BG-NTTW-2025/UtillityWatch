<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Utility Watch v0.4.0</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
<header><h1>Utility Watch</h1><span>v0.4.0</span></header>

<nav id="menu">
<button data-page="dashboard">Dashboard</button>
<button data-page="monitoring">Mijn bewakingen</button>
<button data-page="settings">Instellingen</button>
<button data-page="logbook">Logboek</button>
</nav>

<section id="dashboard" class="page">
<h2>Dashboard</h2>
<p>Sprint 0.4.0</p>
</section>

<section id="monitoring" class="page" style="display:none">
<h2>Mijn bewakingen</h2>

<div class="form">
<label>Naam</label><input id="MonitoringName" autocomplete="off">
<label>Provider</label>
<select id="MonitoringProvider"><option>HEP</option></select>
<label>Land</label>
<select id="MonitoringCountry"><option>Kroatië</option></select>
<label>Provincie</label><input id="MonitoringProvince" value="Bjelovar">
<label>Plaats</label><input id="MonitoringPlace">
<label>Straat</label><input id="MonitoringStreet">
<label>Huisnummer</label><input id="MonitoringNumber">
<label>Filter</label>
<select id="MonitoringFilter">
<option>Hele plaats</option>
<option>Straat</option>
<option>Exact adres</option>
</select>
<button id="BtnSave" type="button">Opslaan</button>
<button id="BtnCancel" type="button" style="display:none">Annuleren</button>
</div>

<h2>Opgeslagen bewakingen</h2>
<div id="MonitoringList"></div>
</section>

<section id="settings" class="page" style="display:none"><h2>Instellingen</h2></section>
<section id="logbook" class="page" style="display:none"><h2>Logboek</h2></section>

<script src="js/app.js"></script>
</body>
</html>
